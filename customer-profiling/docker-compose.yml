services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-customer_profiling}
      POSTGRES_USER: ${POSTGRES_USER:-customer_profiling}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-customer_profiling}
    volumes:
      - customer_profiling_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-customer_profiling} -d ${POSTGRES_DB:-customer_profiling}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    environment:
      PORT: ${API_PORT:-3000}
      MODULE_VERSION: ${MODULE_VERSION:-0.1.4}
      API_BASE_PATH: ${API_BASE_PATH:-/api/customer-profiling}
      WEB_BASE_PATH: ${WEB_BASE_PATH:-/customer-profiling}
      MAIN_BASE_URL: ${MAIN_BASE_URL:-http://main-system:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://customer_profiling:customer_profiling@postgres:5432/customer_profiling?schema=public}
      MODULE_REGISTRY_CACHE_TTL_MS: ${MODULE_REGISTRY_CACHE_TTL_MS:-60000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  web:
    build:
      context: ./web
      args:
        WEB_BASE_PATH: ${WEB_BASE_PATH:-/customer-profiling}
        VITE_WEB_BASE_PATH: ${VITE_WEB_BASE_PATH:-/customer-profiling}
        VITE_API_BASE_PATH: ${VITE_API_BASE_PATH:-/api/customer-profiling}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-0.1.4}
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  customer_profiling_pgdata:
