name: CI Release Template

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API deps
        working-directory: api
        run: npm ci

      - name: Install Web deps
        working-directory: web
        run: npm ci

      - name: Build API
        working-directory: api
        run: npm run build

      - name: Build Web
        working-directory: web
        run: npm run build

  release-prepare:
    if: github.ref == 'refs/heads/master'
    needs: [build-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release artifact placeholders
        run: |
          mkdir -p dist-artifacts
          echo "Attach docker image metadata and release notes here." > dist-artifacts/README.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-prep
          path: dist-artifacts
